{% extends "main.html" %}

{% block content %}

<div class="head">
    <h1>Forgot Password</h1>
</div>

<form method="post">
    <p style="color:red;">{{ error }}</p>
    {% csrf_token %}
    <input type="text" name="username" placeholder="Enter Username" required>
    <button type="submit">Next</button>
</form>
{% endblock  %}
