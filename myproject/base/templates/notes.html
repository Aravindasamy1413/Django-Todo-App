{% extends "main.html" %}

{% block content %}
<div class="head">
<h1>This Is Notes Page</h1>

<h2>My Notes</h2><br>

<form method="POST">
    {% csrf_token %}
    <input type="text" name="content" placeholder="Write your note..." required><br><br>
    <button type="submit">Add Notes</button><br><br>
</form>

<hr>

<h3>Your Notes:</h3>

{% for note in notes %}
    <div style="margin-bottom:10px; padding:10px; border:1px solid #ccc;">
        {{ note.content }}
        <br>
        <small>Added on: {{ note.created_at|date:"d-m-Y" }}</small><br>

        <a href="{% url 'edit_note' note.id %}">Edit Notes</a>
        <a href="{% url 'delete_note' note.id %}">Delete Notes</a>
    </div>
{% empty %}
    
{% endfor %}
</div>
{% endblock  %}
